name: Validate and deploy GitHub Pages

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 * * * *"
  repository_dispatch:
    types:
      - skills-library-updated
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for accessibility checks
        run: npx playwright install --with-deps chromium

      - name: Refresh UCSD Skills Library catalog
        env:
          SKILLS_GITHUB_TOKEN: ${{ github.token }}
        run: npm run sync:skills

      - name: Build project Pages site
        env:
          SITE_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Validate routes and integrations
        env:
          SITE_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run validate

      - name: Run site-wide accessibility checks
        run: npm run test:a11y

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-${{ github.run_id }}
          path: reports/accessibility.json
          retention-days: 30
          if-no-files-found: error

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
